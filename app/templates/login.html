<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ChurnGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .box { background: #fff; padding: 40px; border: 1px solid #e5e7eb; border-radius: 12px; width: 100%; max-width: 400px; }
    .box h1 { font-size: 1.5em; margin-bottom: 24px; text-align: center; }
    label { display: block; font-size: 0.9em; font-weight: 600; margin-bottom: 4px; color: #374151; }
    input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1em; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; background: #4f46e5; color: #fff; border: none; border-radius: 6px; font-size: 1.05em; font-weight: 600; cursor: pointer; }
    button:hover { background: #4338ca; }
    .link { text-align: center; margin-top: 16px; color: #6b7280; }
    .link a { color: #4f46e5; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Log in</h1>
    <form method="POST">
      <label>Email</label>
      <input type="email" name="email" required autofocus>
      <label>Password</label>
      <input type="password" name="password" required>
      <button type="submit">Log In</button>
    </form>
    <div class="link">Don't have an account? <a href="/auth/signup">Sign up</a></div>
  </div>
</body>
</html>
